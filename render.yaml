services:
  - type: web
    name: event-system
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /
    envVars:
      - key: RAILS_MASTER_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: event-system-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: event-system-redis
          type: redis
          property: connectionString
      - key: RAILS_ENV
        value: production
      - key: GMAIL_USERNAME
        sync: false
      - key: GMAIL_PASSWORD
        sync: false

  - type: worker
    name: event-system-sidekiq
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerCommand: bundle exec sidekiq
    plan: free
    envVars:
      - key: RAILS_MASTER_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: event-system-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: event-system-redis
          type: redis
          property: connectionString
      - key: RAILS_ENV
        value: production
      - key: GMAIL_USERNAME
        sync: false
      - key: GMAIL_PASSWORD
        sync: false

  - type: redis
    name: event-system-redis
    plan: free
    ipAllowList: []

databases:
  - name: event-system-db
    plan: free
    databaseName: event_system_production
    user: event_system
